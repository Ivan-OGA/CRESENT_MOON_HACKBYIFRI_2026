<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil of StudyTime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
      <!-- Grande div  -->
  <div class="principal">
    <!-- Header -->
    <div class="header">
      <div class="logo"><i class="fa-solid fa-user-graduate" style="color: rgb(112, 91, 197);"></i></div>
      <div>
        <h1>StudyTime</h1>
        <p>Suivi académique universitaire</p>
      </div>
    </div>

    <!-- Menu navbar -->
    <div class="principal_nav">
      <button ><a href="./index.html">Tableau de Bord</a></button>
      <button class="activ"><a href="./profil.html">Profil</a></button>
      <button><a href="./myclasses.html">Mes Cours</a></button>
      <button><a href="./quiz.html">Quiz</a></button>
      <button><a href="./rattrapage.html">Rattrapages</a></button>
      <button><a href="./planning.html">Planning</a></button>
    </div>
    <div class="Formulaire">
        <div class="begin">
            <span id="icons"> <i class="fa-sharp fa-solid fa-meteor" style="color: rgb(112, 91, 197);"></i> Bienvenue sur StudyTime!</span>
            
            <h5>Commencez par créer votre profil étudiant.Ces informations ne seront demandées qu'une seule fois. </h5>
        </div>
        <form action="/save_profile" method="POST">
            <div class="Form">
            <h2>Créer votre profil </h2>
            <div class="name"> 
                <p class="Htext">Nom complet</p>
                <input type="text" name=request.form.get("username") placeholder="Nom et Prénoms " id="name_surname" required></div>
            <div class="mail">
                <p class="Htext">Email</p>
                <input type="email"name=request.form.get("email") placeholder="@gmail.com" id="mail" required>
            </div>
            <div class="student_Id">
                <p class="Htext">Idendifiant Matricule</p>
                <input type="value" name=request.form.get("matricule") placeholder="XXXXXX" id="Id" required>
            </div>
            <div class="Etablissement">
                <p class="Htext">Etablissement</p>
                <input type="text" id="etab"name=request.form.get("etablissement") placeholder="Nom de L'institut ou de la Facultée" required>
            </div>
            <div class="Filiere">
                <p class="Htext">Programmes d'études </p>
                <input type="text" name=request.form.get("filière") placeholder="Ex: Licence Informatique " id="file" required>
            </div>
            <div class="chekmate">
                <input type="submit" id="check" value="Enregistrer">
            </div>
        </div>
    
        </form>
        </div>

</body>
</html>
